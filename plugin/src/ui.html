<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claude AI Bridge</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #333;
      background: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Mode Tabs ─────────────────────────────────────────────────────────── */

    .mode-tabs {
      display: flex;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
      flex-shrink: 0;
    }

    .mode-tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      width: auto;
    }

    .mode-tab:hover {
      color: #666;
    }

    .mode-tab.active {
      color: #18a0fb;
      border-bottom-color: #18a0fb;
    }

    /* ── Tab Content ───────────────────────────────────────────────────────── */

    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Common Styles ─────────────────────────────────────────────────────── */

    .header {
      margin-bottom: 0;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #666;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      flex-shrink: 0;
    }

    .status-indicator.connected {
      background: #0fa958;
    }

    .status-indicator.error {
      background: #f24822;
    }

    .section {
      padding: 12px;
      background: #f5f5f5;
      border-radius: 4px;
    }

    .section-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
    }

    input:not([type="checkbox"]), select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 11px;
      background: #fff;
      color: #333;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      color: #666;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #18a0fb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.secondary {
      background: #fff;
      color: #333;
      border: 1px solid #ccc;
    }

    .log {
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 10px;
      padding: 8px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      max-height: 160px;
      overflow-y: auto;
      color: #333;
    }

    .log-entry {
      margin-bottom: 4px;
      word-break: break-all;
    }

    .error-banner {
      background: #fff0f0;
      border: 1px solid #f24822;
      color: #c00;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
      margin: 8px 16px 0;
      display: none;
      flex-shrink: 0;
    }

    /* Connection rows */
    .connection-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e5e5e5;
    }

    .connection-row:last-of-type {
      border-bottom: none;
    }

    .conn-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }

    .conn-dot.connected { background: #0fa958; }
    .conn-dot.error { background: #f24822; }
    .conn-dot.connecting { background: #f0a400; }

    .conn-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .conn-name {
      font-size: 11px;
      font-weight: 600;
      color: #333;
    }

    .conn-port {
      font-size: 10px;
      color: #999;
    }

    /* Toggle switch */
    .toggle-label {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
      cursor: pointer;
      margin: 0;
    }

    .toggle-label input[type="checkbox"] {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 18px;
      transition: background 0.2s;
    }

    .toggle-slider:before {
      position: absolute;
      content: '';
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-label input:checked + .toggle-slider {
      background: #18a0fb;
    }

    .toggle-label input:checked + .toggle-slider:before {
      transform: translateX(14px);
    }

    /* Both-active warning */
    .warning-banner {
      display: none;
      margin-top: 10px;
      padding: 8px 10px;
      background: #fff8e6;
      border: 1px solid #f0c040;
      border-radius: 4px;
      font-size: 10px;
      color: #7a5500;
      line-height: 1.5;
    }

    .warning-banner strong {
      display: block;
      margin-bottom: 2px;
      font-size: 11px;
    }

    /* ── Organize Mode ─────────────────────────────────────────────────────── */

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 8px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: #333;
      width: auto;
    }

    .action-btn:hover {
      border-color: #18a0fb;
      background: #f0f8ff;
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      border-color: #e0e0e0;
      background: #fff;
    }

    .action-icon {
      font-size: 20px;
      line-height: 1;
    }

    .action-label {
      font-size: 10px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
    }

    .action-desc {
      font-size: 9px;
      color: #999;
      text-align: center;
      line-height: 1.3;
    }

    /* Organize result banner */
    .result-banner {
      padding: 10px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
    }

    .result-banner.success {
      display: block;
      background: #edfbf0;
      border: 1px solid #0fa958;
      color: #0a7a3e;
    }

    .result-banner.error {
      display: block;
      background: #fff0f0;
      border: 1px solid #f24822;
      color: #c00;
    }

    .result-banner .dismiss {
      display: inline;
      background: none;
      border: none;
      color: inherit;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      width: auto;
      font-size: 10px;
      font-weight: 400;
      margin-left: 4px;
    }

    /* Settings row for organize actions */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .setting-row label {
      margin: 0;
      font-size: 11px;
      color: #333;
    }

    .setting-row input[type="number"] {
      width: 60px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="error-banner" class="error-banner"></div>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-tab="design" onclick="switchTab('design')">Design</button>
    <button class="mode-tab" data-tab="organize" onclick="switchTab('organize')">Organize</button>
  </div>

  <!-- ═══ Design Tab ═══ -->
  <div id="tab-design" class="tab-content active">
    <div class="header">
      <h1>Claude AI Bridge</h1>
      <div class="status">
        <div class="status-indicator" id="status-indicator"></div>
        <span id="status-text">Not connected</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Connection</div>

      <div class="connection-row">
        <div class="conn-left">
          <div class="conn-dot" id="cc-dot"></div>
          <div class="conn-info">
            <span class="conn-name">figma-bridge</span>
            <span class="conn-port">port 3055</span>
          </div>
        </div>
        <label class="toggle-label">
          <input type="checkbox" id="cc-toggle" onchange="onCCToggle()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Activity Log</div>
      <div class="log" id="log"></div>
      <button class="secondary" onclick="clearLog()" style="margin-top: 8px;">Clear Log</button>
    </div>

    <div class="section">
      <div class="section-title">Quick Actions</div>
      <button class="secondary" onclick="onTestClick()">Test Connection</button>
    </div>
  </div>

  <!-- ═══ Organize Tab ═══ -->
  <div id="tab-organize" class="tab-content">

    <div id="organize-result" class="result-banner"></div>

    <div class="section">
      <div class="section-title">Spatial Actions</div>
      <div class="action-grid">
        <button class="action-btn" onclick="onAlignFrames()" id="btn-align">
          <span class="action-icon">&#9638;</span>
          <span class="action-label">Align Frames</span>
          <span class="action-desc">Auto-arrange frames on page</span>
        </button>
        <button class="action-btn" onclick="onSortPages()" id="btn-sort">
          <span class="action-icon">&#8693;</span>
          <span class="action-label">Sort Pages</span>
          <span class="action-desc">Alphabetical page order</span>
        </button>
        <button class="action-btn" onclick="onCreateSection()" id="btn-section">
          <span class="action-icon">&#9635;</span>
          <span class="action-label">Create Section</span>
          <span class="action-desc">Group selection into section</span>
        </button>
        <button class="action-btn" disabled style="opacity:0.35;">
          <span class="action-icon">&#9881;</span>
          <span class="action-label">Page Health</span>
          <span class="action-desc">Coming in Phase 2</span>
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Alignment Settings</div>
      <div class="setting-row">
        <label>Horizontal gap (px)</label>
        <input type="number" id="align-gap-x" value="100" min="0" max="1000" style="width:60px;">
      </div>
      <div class="setting-row">
        <label>Vertical gap (px)</label>
        <input type="number" id="align-gap-y" value="200" min="0" max="1000" style="width:60px;">
      </div>
      <div class="setting-row">
        <label>Max columns</label>
        <input type="number" id="align-cols" value="0" min="0" max="20" style="width:60px;">
      </div>
      <div style="font-size:9px; color:#999; margin-top:4px;">0 = auto (square grid based on frame count)</div>
    </div>

    <div class="section">
      <div class="section-title">Activity Log</div>
      <div class="log" id="organize-log"></div>
    </div>
  </div>

  <script>
    window.onerror = function(msg, url, line, col, error) {
      showError('JS Error: ' + msg + ' (line ' + line + ')');
      return false;
    };

    window.onunhandledrejection = function(event) {
      showError('Unhandled promise rejection: ' + event.reason);
    };

    function showError(msg) {
      var banner = document.getElementById('error-banner');
      if (banner) {
        banner.style.display = 'block';
        banner.textContent = msg;
      }
      log(msg, 'error');
    }

    // ── State ──────────────────────────────────────────────────────────────
    var wsCC = null;
    var isCCConnected = false;
    var currentTab = 'design';

    // Track pending organize actions so we can handle responses in the UI
    var pendingOrganizeActions = {};

    // ── Tab Switching ──────────────────────────────────────────────────────

    function switchTab(tab) {
      currentTab = tab;
      // Update tab buttons
      var tabs = document.querySelectorAll('.mode-tab');
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
      }
      // Update tab content
      var contents = document.querySelectorAll('.tab-content');
      for (var i = 0; i < contents.length; i++) {
        contents[i].classList.toggle('active', contents[i].id === 'tab-' + tab);
      }
    }

    // ── Logging ──────────────────────────────────────────────────────────

    function log(message, type) {
      type = type || 'info';
      // Log to both design and organize logs
      var logIds = ['log', 'organize-log'];
      for (var i = 0; i < logIds.length; i++) {
        var logEl = document.getElementById(logIds[i]);
        if (!logEl) continue;

        var timestamp = new Date().toLocaleTimeString();
        var entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.textContent = '[' + timestamp + '] ' + message;

        if (type === 'error')   entry.style.color = '#f24822';
        else if (type === 'success') entry.style.color = '#0fa958';
        else if (type === 'warning') entry.style.color = '#cc8800';
        else entry.style.color = '#333';

        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
      }
    }

    function clearLog() {
      var logEl = document.getElementById('log');
      if (logEl) logEl.innerHTML = '';
      log('Log cleared');
    }

    // ── Organize Result Banner ─────────────────────────────────────────────

    function showOrganizeResult(message, type) {
      var banner = document.getElementById('organize-result');
      if (!banner) return;
      banner.className = 'result-banner ' + type;
      banner.innerHTML = message + ' <button class="dismiss" onclick="dismissResult()">dismiss</button>';
    }

    function dismissResult() {
      var banner = document.getElementById('organize-result');
      if (banner) {
        banner.className = 'result-banner';
        banner.style.display = 'none';
      }
    }

    // ── Header status ─────────────────────────────────────────────────────

    function updateHeaderStatus() {
      var indicator = document.getElementById('status-indicator');
      var text = document.getElementById('status-text');
      if (!indicator || !text) return;

      indicator.className = 'status-indicator';
      if (isCCConnected) {
        indicator.classList.add('connected');
        text.textContent = 'Connected';
      } else {
        text.textContent = 'Not connected';
      }
    }

    // ── Dot helpers ───────────────────────────────────────────────────────

    function setDot(id, state) {
      var dot = document.getElementById(id);
      if (dot) dot.className = 'conn-dot' + (state ? ' ' + state : '');
    }

    // ── Claude Code (3055) ────────────────────────────────────────────────

    function onCCToggle() {
      var checked = document.getElementById('cc-toggle').checked;
      if (checked) connectCC(); else disconnectCC();
    }

    function connectCC() {
      var url = 'ws://localhost:3055';
      log('Connecting to Claude Code (' + url + ')...');
      setDot('cc-dot', 'connecting');

      try {
        wsCC = new WebSocket(url);
      } catch (e) {
        showError('CC WebSocket failed: ' + e.message);
        setDot('cc-dot', 'error');
        document.getElementById('cc-toggle').checked = false;
        return;
      }

      wsCC.onopen = function() {
        isCCConnected = true;
        log('Connected to Claude Code', 'success');
        setDot('cc-dot', 'connected');
        updateHeaderStatus();
      };

      wsCC.onclose = function(event) {
        log('Claude Code disconnected (code: ' + event.code + ')', 'warning');
        isCCConnected = false;
        wsCC = null;
        setDot('cc-dot', '');
        document.getElementById('cc-toggle').checked = false;
        updateHeaderStatus();
      };

      wsCC.onerror = function() {
        log('Claude Code error — is the MCP server running on port 3055?', 'error');
        setDot('cc-dot', 'error');
      };

      wsCC.onmessage = function(event) {
        try {
          var msg = JSON.parse(event.data);
          log('[CC] Received: ' + (msg.type || 'unknown'));
          parent.postMessage({ pluginMessage: msg }, '*');
        } catch (e) {
          log('[CC] Parse error: ' + e.message, 'error');
        }
      };
    }

    function disconnectCC() {
      log('Disconnecting from Claude Code...');
      if (wsCC) { wsCC.close(); wsCC = null; }
      isCCConnected = false;
      setDot('cc-dot', '');
      updateHeaderStatus();
    }

    // ── Response routing ──────────────────────────────────────────────────
    // When code.ts sends a response, forward it back to the CLI server
    // via WebSocket. Organize action responses are handled locally.

    window.addEventListener('message', function(event) {
      try {
        var response = event.data && event.data.pluginMessage;
        if (!response) return;

        // Check if this is a response to an organize UI action
        if (response.requestId && pendingOrganizeActions[response.requestId]) {
          var action = pendingOrganizeActions[response.requestId];
          delete pendingOrganizeActions[response.requestId];
          handleOrganizeResponse(action, response);
          return;
        }

        if (wsCC && wsCC.readyState === WebSocket.OPEN) {
          wsCC.send(JSON.stringify(response));
          log('Sent: ' + (response.type || 'response'));
        }
      } catch (e) {
        log('Error forwarding message: ' + e.message, 'error');
      }
    });

    // ── Organize Action Helpers ────────────────────────────────────────────

    var organizeRequestCounter = 0;

    function sendOrganizeAction(type, data, actionName) {
      var requestId = 'organize_' + (++organizeRequestCounter);
      pendingOrganizeActions[requestId] = actionName;
      parent.postMessage({ pluginMessage: { requestId: requestId, type: type, data: data || {} } }, '*');
      log('Running: ' + actionName + '...', 'info');
    }

    function handleOrganizeResponse(action, response) {
      if (response.type === 'error') {
        showOrganizeResult('<strong>' + action + ' failed:</strong> ' + (response.data && response.data.message || 'Unknown error'), 'error');
        log(action + ' failed: ' + (response.data && response.data.message || 'Unknown error'), 'error');
        return;
      }

      var data = response.data || {};

      switch (action) {
        case 'Align Frames':
          showOrganizeResult(
            '<strong>Frames aligned</strong> — ' + (data.count || 0) + ' frames arranged in ' +
            (data.cols || '?') + ' columns with ' + (data.gapX || '?') + 'px/' + (data.gapY || '?') + 'px gaps',
            'success'
          );
          log('Aligned ' + (data.count || 0) + ' frames', 'success');
          break;

        case 'Sort Pages':
          showOrganizeResult(
            '<strong>Pages sorted</strong> — ' + (data.count || 0) + ' pages reordered alphabetically',
            'success'
          );
          log('Sorted ' + (data.count || 0) + ' pages', 'success');
          break;

        case 'Create Section':
          showOrganizeResult(
            '<strong>Section created</strong> — "' + (data.name || 'Section') + '" wrapping ' + (data.childCount || 0) + ' nodes',
            'success'
          );
          log('Created section: ' + (data.name || 'Section'), 'success');
          break;

        default:
          log(action + ' completed', 'success');
      }
    }

    // ── Organize Button Handlers ───────────────────────────────────────────

    function onAlignFrames() {
      var gapX = parseInt(document.getElementById('align-gap-x').value) || 100;
      var gapY = parseInt(document.getElementById('align-gap-y').value) || 200;
      var maxCols = parseInt(document.getElementById('align-cols').value) || 0;
      sendOrganizeAction('align-frames', { gapX: gapX, gapY: gapY, maxCols: maxCols }, 'Align Frames');
    }

    function onSortPages() {
      sendOrganizeAction('sort-pages', {}, 'Sort Pages');
    }

    function onCreateSection() {
      sendOrganizeAction('create-section-from-selection', {}, 'Create Section');
    }

    // ── Quick Actions ─────────────────────────────────────────────────────

    function onTestClick() {
      if (!isCCConnected) {
        log('Not connected — enable at least one connection first', 'warning');
        return;
      }
      log('Sending ping...');
      parent.postMessage({ pluginMessage: { type: 'ping' } }, '*');
    }

    // ── Init ──────────────────────────────────────────────────────────────
    log('Plugin UI loaded');
    log('WebSocket available: ' + (typeof WebSocket !== 'undefined'));
  </script>
</body>
</html>
